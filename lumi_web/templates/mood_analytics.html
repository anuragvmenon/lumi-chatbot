<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Your Mood Over Time</h1>
    <canvas id="moodChart" width="400" height="200"></canvas>

    <script>
        const moods = JSON.parse(localStorage.getItem('moods'));

        if (moods) {
            const labels = moods.map(mood => new Date(mood.timestamp).toLocaleString());
            const data = moods.map(mood => {
                switch (mood.emotion) {
                    case 'happy': return 5;
                    case 'sad': return 1;
                    case 'angry': return 2;
                    case 'fearful': return 3;
                    case 'disgusted': return 2;
                    case 'surprised': return 4;
                    case 'neutral': return 3;
                    default: return 3;
                }
            });

            const ctx = document.getElementById('moodChart').getContext('2d');
            const moodChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Your Mood',
                        data: data,
                        backgroundColor: 'rgba(75, 192, 192, 0.2)',
                        borderColor: 'rgba(75, 192, 192, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 5
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
